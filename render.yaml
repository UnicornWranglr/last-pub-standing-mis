# Render Blueprint for Last Pub Standing MIS
# https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this repo to GitHub.
#   2. In Render, click "New +" → "Blueprint" and select this repo.
#   3. Render will detect this file and create a Postgres DB + Web service.
#   4. Fill in the env vars marked `sync: false` in the Render UI before deploying.
#   5. After the first deploy, copy the web service URL and set it as
#      VITE_API_URL in your Vercel project.
#   6. Once Vercel is deployed, set CLIENT_URL on this service to the Vercel
#      URL (e.g. https://lps-mis.vercel.app) and trigger a manual deploy.

databases:
  - name: lps-mis-db
    databaseName: pub_mis
    user: pub
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: lps-mis-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    # Run migrations + seed + start on every deploy. Both scripts are idempotent.
    startCommand: node src/db/migrate.js && node src/db/seed.js && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      # Database connection auto-wired from the Postgres instance above.
      - key: DATABASE_URL
        fromDatabase:
          name: lps-mis-db
          property: connectionString
      # Signing key — Render generates a strong random value on first deploy.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      # Fill in on first deploy. Set to your Vercel URL, e.g.
      # https://lps-mis.vercel.app
      - key: CLIENT_URL
        sync: false
      # Seeded users — usernames locked, passwords set manually in Render UI.
      - key: SEED_OWNER_USERNAME
        value: simon
      - key: SEED_OWNER_PASSWORD
        sync: false
      - key: SEED_STAFF_USERNAME
        value: daniel
      - key: SEED_STAFF_PASSWORD
        sync: false
